<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiZim AI — Financial Assistant</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────── */
    :root {
      --bg-base:        #E8E4DC;
      --bg-card:        #FFFFFF;
      --bg-dark:        #0D0D0D;
      --border-color:   #0D0D0D;
      --border-sm:      1.5px solid #0D0D0D;
      --border-md:      2px solid #0D0D0D;
      --border-lg:      3px solid #0D0D0D;
      --slab-primary:   #1A3A5C;
      --slab-energy:    #C9A227;
      --slab-danger:    #D92B2B;
      --slab-success:   #1A6B4A;
      --text-on-slab:   #FFFFFF;
      --text-primary:   #0D0D0D;
      --text-muted:     #5C5852;
      --text-faint:     #9C9890;
      --shadow-sm:      3px 3px 0 #0D0D0D;
      --shadow-md:      4px 4px 0 #0D0D0D;
      --shadow-lg:      6px 6px 0 #0D0D0D;
      --shadow-hover:   6px 6px 0 #0D0D0D;
      --font-display:   'Syne', sans-serif;
      --font-body:      'DM Sans', sans-serif;
      --font-mono:      'JetBrains Mono', monospace;
    }

    /* ─── GLOBAL RESET ──────────────────────────────────── */
    * {
      border-radius: 0 !important;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      font-family: var(--font-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      overflow: hidden;
    }

    [x-cloak] { display: none !important; }

    /* ─── TYPOGRAPHY ────────────────────────────────────── */
    .font-display { font-family: var(--font-display); }
    .font-mono    { font-family: var(--font-mono); }

    /* ─── SLAB SYSTEM ───────────────────────────────────── */
    .slab {
      display: inline;
      padding: 2px 8px;
      font-family: var(--font-display);
      font-weight: 800;
      line-height: 1.3;
    }
    .slab-primary  { background: var(--slab-primary); color: var(--text-on-slab); }
    .slab-energy   { background: var(--slab-energy);  color: var(--text-on-slab); }
    .slab-danger   { background: var(--slab-danger);  color: var(--text-on-slab); }
    .slab-success  { background: var(--slab-success); color: var(--text-on-slab); }
    .slab-dark     { background: var(--bg-dark);      color: var(--text-on-slab); }

    /* ─── LAYOUT ────────────────────────────────────────── */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ───────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
      border-right: var(--border-lg);
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 2px solid rgba(255,255,255,0.12);
    }

    .logo-wordmark {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--bg-base);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(232,228,220,0.4);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 4px 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(232,228,220,0.5);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #4ADE80;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .sidebar-section-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(232,228,220,0.3);
      padding: 16px 20px 8px;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 2px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 20px;
      cursor: default;
      transition: background 0.1s;
    }

    .history-item:hover { background: rgba(255,255,255,0.05); }

    .history-icon {
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .history-name {
      font-size: 11px;
      font-weight: 600;
      color: rgba(232,228,220,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .history-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(232,228,220,0.3);
      margin-top: 2px;
    }

    .history-empty {
      padding: 24px 20px;
      font-size: 11px;
      color: rgba(232,228,220,0.25);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.7;
    }

    .sidebar-footer {
      border-top: 2px solid rgba(255,255,255,0.1);
      padding: 12px;
    }

    .btn-new-doc {
      width: 100%;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.2);
      color: rgba(232,228,220,0.7);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
    }

    .btn-new-doc:hover {
      border-color: rgba(255,255,255,0.4);
      color: var(--bg-base);
      background: rgba(255,255,255,0.05);
    }

    /* ─── MAIN ──────────────────────────────────────────── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── TOP BAR ───────────────────────────────────────── */
    .topbar {
      flex-shrink: 0;
      background: var(--bg-card);
      border-bottom: var(--border-lg);
      height: 64px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .topbar-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    /* ─── STEP PROGRESS ─────────────────────────────────── */
    .step-progress {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .step-node {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .step-circle {
      width: 28px;
      height: 28px;
      border: var(--border-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .step-circle.done     { background: var(--slab-success); color: #fff; border-color: var(--slab-success); }
    .step-circle.active   { background: var(--slab-primary); color: #fff; border-color: var(--slab-primary); }
    .step-circle.pending  { background: var(--bg-base); color: var(--text-faint); }

    .step-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 8px;
      white-space: nowrap;
    }

    .step-label.done     { color: var(--slab-success); }
    .step-label.active   { color: var(--slab-primary); }
    .step-label.pending  { color: var(--text-faint); }

    .step-connector {
      width: 24px;
      height: 2px;
      background: var(--border-color);
      opacity: 0.15;
      flex-shrink: 0;
    }

    .step-connector.done { opacity: 1; background: var(--slab-success); }

    /* ─── CONTENT ───────────────────────────────────────── */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .content-scroll::-webkit-scrollbar { width: 4px; }
    .content-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }

    /* ─── CARDS ─────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: var(--border-lg);
      box-shadow: var(--shadow-md);
      padding: 32px;
    }

    .card-inner {
      background: var(--bg-base);
      border: var(--border-md);
      padding: 20px;
    }

    /* ─── BUTTONS ───────────────────────────────────────── */
    .btn {
      height: 48px;
      padding: 0 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: var(--border-md);
      box-shadow: var(--shadow-md);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hover);
    }

    .btn:active:not(:disabled) {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 #0D0D0D;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-primary  { background: var(--slab-primary); color: #fff; }
    .btn-energy   { background: var(--slab-energy);  color: #fff; }
    .btn-success  { background: var(--slab-success); color: #fff; }
    .btn-danger   { background: var(--slab-danger);  color: #fff; }
    .btn-ghost    { background: transparent; color: var(--text-primary); }
    .btn-dark     { background: var(--bg-dark); color: var(--bg-base); }

    .btn-full { width: 100%; }
    .btn-sm   { height: 36px; padding: 0 14px; font-size: 11px; }

    /* ─── TEMPLATE CARDS ────────────────────────────────── */
    .template-card {
      border: var(--border-md);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s;
      box-shadow: var(--shadow-sm);
      background: var(--bg-card);
    }

    .template-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hover);
    }

    .template-card.selected {
      background: var(--slab-primary);
      border-color: var(--slab-primary);
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hover);
    }

    .template-card.selected .tmpl-name  { color: #fff; }
    .template-card.selected .tmpl-desc  { color: rgba(255,255,255,0.65); }
    .template-card.selected .tmpl-icon  { background: rgba(255,255,255,0.15); color: #fff; }
    .template-card.selected .tmpl-radio { border-color: #fff; background: #fff; }
    .template-card.selected .tmpl-radio-dot { display: block; }

    .tmpl-icon {
      width: 40px;
      height: 40px;
      border: var(--border-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--bg-base);
      color: var(--text-primary);
      transition: background 0.1s, color 0.1s;
    }

    .tmpl-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tmpl-desc {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: var(--font-mono);
    }

    .tmpl-radio {
      width: 18px;
      height: 18px;
      border: var(--border-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .tmpl-radio-dot {
      display: none;
      width: 6px;
      height: 6px;
      background: var(--slab-primary);
    }

    /* ─── DROP ZONE ─────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border-color);
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: background 0.1s, border-style 0.1s;
      background: var(--bg-base);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      background: #DDD9CF;
      border-style: solid;
    }

    .drop-label-main {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .drop-label-main span {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .drop-label-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── RECORD BUTTON ─────────────────────────────────── */
    .record-btn {
      width: 96px;
      height: 96px;
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      background: var(--slab-primary);
      color: #fff;
      position: relative;
    }

    .record-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #0D0D0D;
    }

    .record-btn.recording {
      background: var(--slab-danger);
      animation: rec-shake 1.5s ease-in-out infinite;
    }

    @keyframes rec-shake {
      0%, 100% { transform: translate(0, 0); }
      25%       { transform: translate(-1px, -1px); }
      75%       { transform: translate(1px, 1px); }
    }

    /* Square pulse ring */
    .pulse-ring {
      position: absolute;
      inset: -8px;
      border: 2px solid var(--slab-danger);
      animation: squarePulse 1.2s ease-out infinite;
    }

    @keyframes squarePulse {
      0%   { transform: scale(1);    opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* ─── INPUTS ────────────────────────────────────────── */
    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      font-family: var(--font-body);
      display: block;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      background: #fff;
      border: var(--border-md);
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.1s, box-shadow 0.1s;
    }

    .field-input:focus {
      border-color: var(--slab-primary);
      box-shadow: 3px 3px 0 var(--slab-primary);
    }

    textarea.field-input {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    /* ─── CHIPS / STATUS ────────────────────────────────── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: var(--border-sm);
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .chip-template {
      background: var(--bg-base);
      color: var(--text-primary);
    }

    /* ─── FORMAT CHOOSER ────────────────────────────────── */
    .format-btn {
      flex: 1;
      height: 44px;
      border: var(--border-md);
      background: var(--bg-base);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.1s, color 0.1s, box-shadow 0.1s;
    }

    .format-btn.selected {
      background: var(--slab-primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    /* ─── ERROR / LOADER ────────────────────────────────── */
    .error-banner {
      border: 2px solid var(--slab-danger);
      background: #FFF0F0;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .error-text {
      font-size: 12px;
      color: var(--slab-danger);
      font-weight: 600;
      line-height: 1.5;
    }

    .loader-banner {
      border: var(--border-md);
      background: var(--bg-base);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-color);
      border-top-color: transparent;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* ─── FILE SELECTED ─────────────────────────────────── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      border: var(--border-md);
      padding: 12px 14px;
      background: var(--bg-base);
    }

    .file-icon {
      width: 36px;
      height: 36px;
      border: var(--border-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--bg-card);
    }

    .file-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ─── SUCCESS SCREEN ────────────────────────────────── */
    .success-stamp {
      width: 80px;
      height: 80px;
      border: var(--border-lg);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--slab-success);
      color: #fff;
      margin: 0 auto 24px;
    }

    .success-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 28px;
    }

    /* ─── SECTION NUMBER ────────────────────────────────── */
    .section-num {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      display: block;
    }

    /* ─── DIVIDER ───────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider-line {
      flex: 1;
      height: 2px;
      background: var(--border-color);
      opacity: 0.12;
    }

    .divider-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-faint);
    }

    /* ─── FADE UP ────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.28s ease-out both; }

    /* ─── REC TIMER ─────────────────────────────────────── */
    .rec-timer {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 400;
      color: var(--slab-danger);
      letter-spacing: 0.06em;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body x-data="app()" x-init="init()">

<div class="app-shell">

  <!-- ══════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════ -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <div class="logo-wordmark">DiZim<span class="slab slab-energy" style="font-size:14px;padding:2px 6px;margin-left:4px;vertical-align:middle">AI</span></div>
      <div class="logo-sub">Financial Assistant</div>
      <div class="status-badge">
        <span class="status-dot"></span>
        Backend online
      </div>
    </div>

    <div class="sidebar-section-label">History</div>

    <div class="sidebar-scroll">

<!-- ══════════════════════════════════════
     ALPINE APP
══════════════════════════════════════ -->
<script>
const API = '';

function app() {
  return {
    // ── STEP STATE ──────────────────────────────────────
    step: 0,
    stepLabels: ['Input', 'Review', 'Publish'],
    stepMeta: [
      { title: 'Voice or text input',    sub: 'Speak or type invoice information' },
      { title: 'Review extracted fields', sub: 'Check and edit before publishing' },
      { title: 'Invoice published',       sub: 'Viettel S-Invoice result' },
    ],

    // ── VIETTEL CONFIG ──────────────────────────────────
    showConfig: false,
    viettelMst:  '',
    viettelUser: '',
    viettelPass: '',

    // ── INPUT STATE ─────────────────────────────────────
    transcribedText: '',
    useLocalAsr: false,

    // Web Speech API state
    recognition: null,
    isListening: false,
    spokenText: '',
    lastHeardText: '',
    liveText: '',

    // MediaRecorder state (for local ASR)
    isRecording: false,
    recordingTime: 0,
    recordingTimer: null,
    mediaRecorder: null,
    audioChunks: [],
    selectedFile: null,

    // ── LOADING FLAGS ───────────────────────────────────
    isTranscribing: false,
    isExtracting:   false,
    isPublishing:   false,

    // ── DATA ────────────────────────────────────────────
    extractedFields: {},
    publishResult:   null,
    history: [],
    error: '',

    // ── INIT ────────────────────────────────────────────
    async init() {
      await this.loadHistory();
    },

    async loadHistory() {
      try {
        const r = await fetch(`${API}/api/history`);
        if (r.ok) this.history = await r.json();
      } catch {}
    },

    // ── WEB SPEECH API MIC ──────────────────────────────
    toggleMic() {
      if (this.isListening) {
        this.recognition && this.recognition.stop();
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        this.error = 'Browser does not support Web Speech API. Use Chrome or Edge.';
        return;
      }
      this.recognition = new SpeechRecognition();
      this.recognition.lang = 'vi-VN';
      this.recognition.continuous = true;
      this.recognition.interimResults = true;
      this.spokenText = '';
      this.lastHeardText = '';
      this.liveText = 'Listening...';
      this.error = '';

      this.recognition.onresult = (event) => {
        let interim = '';
        let finalText = '';
        for (let i = 0; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalText += t + ' ';
          else interim += t;
        }
        if (finalText) this.spokenText = finalText;
        this.lastHeardText = finalText + interim;
        this.liveText = this.lastHeardText || 'Listening...';
      };

      this.recognition.onend = () => {
        this.isListening = false;
        const text = (this.spokenText || this.lastHeardText).trim();
        if (text) {
          this.transcribedText = text;
          this.liveText = '';
        } else {
          this.liveText = '';
          this.error = 'No audio detected. Please speak clearly and try again.';
        }
      };

      this.recognition.onerror = (e) => {
        if (e.error === 'not-allowed') this.error = 'Please grant microphone permission to the browser.';
        this.isListening = false;
      };

      this.recognition.start();
      this.isListening = true;
    },

    // ── LOCAL ASR RECORDING (Phu's model) ──────────────
    async toggleLocalRecording() {
      if (this.isRecording) {
        clearInterval(this.recordingTimer);
        this.isRecording = false;
        if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
          this.mediaRecorder.stop();
        }
        return;
      }
      this.error = '';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        this.audioChunks = [];
        this.mediaRecorder = new MediaRecorder(stream);
        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
        this.mediaRecorder.onstop = () => {
          const blob = new Blob(this.audioChunks, { type: 'audio/wav' });
          this.selectedFile = new File([blob], 'recording.wav', { type: 'audio/wav' });
          stream.getTracks().forEach(t => t.stop());
          this.sendToLocalAsr();
        };
        this.mediaRecorder.start(200);
        this.isRecording = true;
        this.recordingTime = 0;
        this.recordingTimer = setInterval(() => this.recordingTime++, 1000);
      } catch (e) {
        this.error = 'Cannot access microphone: ' + e.message;
      }
    },

    async sendToLocalAsr() {
      if (!this.selectedFile) return;
      this.isTranscribing = true;
      this.error = '';
      try {
        const fd = new FormData();
        fd.append('audio', this.selectedFile, this.selectedFile.name);
        const r = await fetch(`${API}/api/transcribe`, { method: 'POST', body: fd });
        if (r.ok) {
          this.transcribedText = (await r.json()).text;
        } else {
          const err = await r.json().catch(() => ({ detail: r.statusText }));
          this.error = err.detail || 'Transcription failed';
        }
      } catch {
        this.error = 'Cannot connect to backend or local ASR service is not running.';
      } finally {
        this.isTranscribing = false;
      }
    },

    // ── EXTRACT ─────────────────────────────────────────
    async extractFields() {
      if (!this.transcribedText.trim()) {
        this.error = 'Please enter or speak invoice info first.';
        return;
      }
      this.isExtracting = true;
      this.error = '';
      try {
        const r = await fetch(`${API}/api/extract`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: this.transcribedText, templateType: 'hoa-don-gtgt' }),
        });
        if (r.ok) {
          this.extractedFields = (await r.json()).fields;
          this.step = 1;
        } else {
          const err = await r.json().catch(() => ({ detail: r.statusText }));
          this.error = 'Extraction failed: ' + (err.detail || r.statusText);
        }
      } catch {
        this.error = 'Cannot connect to backend (localhost:8000).';
      } finally {
        this.isExtracting = false;
      }
    },

    // ── PUBLISH ──────────────────────────────────────────
    async publishInvoice() {
      this.isPublishing = true;
      this.error = '';
      try {
        const body = {
          invoice_data: this.extractedFields,
          viettel_mst:  this.viettelMst  || null,
          viettel_user: this.viettelUser || null,
          viettel_pass: this.viettelPass || null,
        };
        const r = await fetch(`${API}/api/invoice/publish`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (r.ok) {
          const data = await r.json();
          const result = data.viettel_response?.result;
          this.publishResult = {
            run_id:           data.run_id,
            invoice_no:       result?.invoiceNo || null,
            transaction_id:   result?.transactionID || null,
            reservation_code: result?.reservationCode || null,
            pdf_url:          data.pdf_url,
            viettel_error:    data.viettel_error || null,
          };
          this.step = 2;
          this.loadHistory();
        } else {
          const err = await r.json().catch(() => ({ detail: r.statusText }));
          this.error = 'Publish failed: ' + (err.detail || r.statusText);
        }
      } catch {
        this.error = 'Cannot connect to backend.';
      } finally {
        this.isPublishing = false;
      }
    },

    downloadPdf() {
      if (!this.publishResult?.pdf_url) return;
      window.open(`${API}${this.publishResult.pdf_url}`, '_blank');
    },

    // ── UTILS ────────────────────────────────────────────
    resetAll() {
      this.step = 0;
      this.transcribedText = '';
      this.extractedFields = {};
      this.publishResult   = null;
      this.selectedFile    = null;
      this.error           = '';
      this.recordingTime   = 0;
      this.liveText        = '';
      if (this.isListening) { this.recognition && this.recognition.stop(); this.isListening = false; }
      if (this.isRecording) { clearInterval(this.recordingTimer); this.isRecording = false; }
    },

    formatTime(s) {
      return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    },

    // Helper to flatten Viettel JSON for display
    flatFields() {
      const f = this.extractedFields;
      const buyer = f.buyerInfo || {};
      const info  = f.generalInvoiceInfo || {};
      const items = f.itemInfo || [];
      return { buyer, info, items };
    },
  }
}
</script>
